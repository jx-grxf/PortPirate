name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Package preview app
        run: ./script/build_and_run.sh build-only

      - name: Verify app signature
        run: codesign --verify --deep --strict dist/MacDev.app
