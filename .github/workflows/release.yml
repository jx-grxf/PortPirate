name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Install DMG builder
        run: brew install create-dmg

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${{ inputs.version }}"
            tag="v${version#v}"
            version="${version#v}"
          fi
          if [[ "$tag" == *"-beta."* || "$tag" == *"-beta"* ]]; then
            channel="beta"
            prerelease="--prerelease"
          else
            channel="stable"
            prerelease=""
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "channel=$channel" >>"$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >>"$GITHUB_OUTPUT"

      - name: Build DMG
        env:
          MACDEV_VERSION: ${{ steps.version.outputs.version }}
          MACDEV_SPARKLE_PUBLIC_KEY: ${{ secrets.MACDEV_SPARKLE_PUBLIC_KEY }}
        run: ./script/package_dmg.sh

      - name: Build Sparkle assets
        env:
          MACDEV_VERSION: ${{ steps.version.outputs.version }}
          MACDEV_UPDATE_CHANNEL: ${{ steps.version.outputs.channel }}
          MACDEV_SPARKLE_PUBLIC_KEY: ${{ secrets.MACDEV_SPARKLE_PUBLIC_KEY }}
          MACDEV_SPARKLE_PRIVATE_KEY: ${{ secrets.MACDEV_SPARKLE_PRIVATE_KEY }}
          MACDEV_SPARKLE_DOWNLOAD_PREFIX: https://github.com/jx-grxf/MacDev/releases/download/${{ steps.version.outputs.tag }}
        run: ./script/create_sparkle_assets.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict dist/MacDev.app

      - name: Verify DMG
        env:
          MACDEV_VERSION: ${{ steps.version.outputs.version }}
        run: hdiutil imageinfo "dist/MacDev-${MACDEV_VERSION}.dmg" >/dev/null

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: MacDev-${{ steps.version.outputs.version }}-dmg
          path: dist/MacDev-${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      - name: Upload Sparkle artifact
        uses: actions/upload-artifact@v7
        with:
          name: MacDev-${{ steps.version.outputs.version }}-sparkle
          path: |
            dist/sparkle/MacDev-${{ steps.version.outputs.version }}.zip
            dist/sparkle/appcast.xml
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          set -euo pipefail
          asset="dist/MacDev-${RELEASE_VERSION}.dmg"
          sparkle_zip="dist/sparkle/MacDev-${RELEASE_VERSION}.zip"
          appcast="dist/sparkle/appcast.xml"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$asset#MacDev-${RELEASE_VERSION}.dmg" --clobber
            gh release upload "$RELEASE_TAG" "$sparkle_zip#MacDev-${RELEASE_VERSION}.zip" --clobber
            gh release upload "$RELEASE_TAG" "$appcast#appcast.xml" --clobber
          else
            gh release create "$RELEASE_TAG" \
              "$asset#MacDev-${RELEASE_VERSION}.dmg" \
              "$sparkle_zip#MacDev-${RELEASE_VERSION}.zip" \
              "$appcast#appcast.xml" \
              --target "$GITHUB_SHA" \
              --title "MacDev ${RELEASE_VERSION}" \
              --notes-file RELEASE_NOTES.md \
              $RELEASE_PRERELEASE
          fi

      - name: Publish beta appcast feed
        if: steps.version.outputs.channel == 'beta'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          beta_tag="beta"
          appcast="dist/sparkle/appcast.xml"
          if gh release view "$beta_tag" >/dev/null 2>&1; then
            gh release edit "$beta_tag" --target "$GITHUB_SHA" --prerelease --title "MacDev Beta Feed"
            gh release upload "$beta_tag" "$appcast#appcast.xml" --clobber
          else
            gh release create "$beta_tag" \
              "$appcast#appcast.xml" \
              --target "$GITHUB_SHA" \
              --title "MacDev Beta Feed" \
              --notes "Moving Sparkle beta appcast feed. Install beta builds from versioned prereleases." \
              --prerelease
          fi

      - name: Trigger website rebuild
        env:
          WEBSITE_DEPLOY_HOOK_URL: ${{ secrets.WEBSITE_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "$WEBSITE_DEPLOY_HOOK_URL" ]; then
            echo "WEBSITE_DEPLOY_HOOK_URL secret is missing."
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$WEBSITE_DEPLOY_HOOK_URL"
