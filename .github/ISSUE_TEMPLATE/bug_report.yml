name: Bug report
description: Report a reproducible MacDev problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a focused, reproducible issue.
  - type: input
    id: version
    attributes:
      label: MacDev version
      description: Release version or commit SHA.
      placeholder: "0.1.3"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command, runtime, port, or workspace state if relevant.
      placeholder: |
        1. Start a Vite server on port 5173.
        2. Open MacDev.
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Redact private paths or process arguments before attaching logs.
